<!-- Main Content - Supprimer la navbar dupliquée et garder seulement le contenu -->
<div class="profile-dashboard" style="margin-top: 76px;">
  <div class="container-fluid px-4 py-4">
    <!-- Welcome Banner -->
    <div class="welcome-banner mb-4">
      <div class="row align-items-center">
        <div class="col-md-8">
          <h1 class="display-6 fw-bold mb-2">
            <i class="fas fa-user-circle me-3"></i>Mon Profil
          </h1>
          <p class="lead mb-0">Gérez vos informations personnelles et votre mot de passe</p>
        </div>
        <div class="col-md-4 text-md-end">
          <div class="date-badge">
            <i class="fas fa-calendar-alt me-2"></i>
            {{ currentDate | date:'EEEE d MMMM yyyy' }}
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <!-- Photo Profile Card -->
      <div class="col-lg-4 mb-4">
        <div class="profile-card">
          <div class="card-body p-4 text-center">
            <div class="profile-photo-container">
              <img
                *ngIf="profilePhoto"
                [src]="profilePhoto"
                alt="Photo de profil"
                class="profile-photo"
              />
              <label for="photoUpload" class="photo-upload-btn">
                <i class="fas fa-camera"></i>
              </label>
              <input
                type="file"
                id="photoUpload"
                (change)="onPhotoSelected($event)"
                accept="image/*"
                style="display: none"
              >
            </div>
            <h3 class="mt-3 mb-1">{{ firstName }} {{ lastName }}</h3>
            <p class="text-muted mb-2">
              <i class="fas fa-envelope me-2"></i>{{ email }}
            </p>
            <span class="role-badge" [ngClass]="{
              'badge-primary': role === 'CLIENT',
              'badge-success': role === 'AGENT_FINANCE',
              'badge-warning': role === 'AGENT_ASSURANCE',
              'badge-danger': role === 'ADMIN'
            }">
              <i class="fas fa-shield-alt me-1"></i>{{ getRoleName() }}
            </span>
          </div>
        </div>
      </div>

      <!-- Informations Personnelles -->
      <div class="col-lg-8 mb-4">
        <div class="info-card">
          <div class="card-header-custom">
            <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i>Informations personnelles</h5>
          </div>
          <div class="card-body p-4">
            <form #infoForm="ngForm">
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Prénom</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" [(ngModel)]="firstName" name="firstName" [disabled]="!isEditing" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Nom</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" [(ngModel)]="lastName" name="lastName" [disabled]="!isEditing" required>
                  </div>
                </div>
              </div>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" [(ngModel)]="email" name="email" [disabled]="!isEditing" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Téléphone</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" class="form-control" [(ngModel)]="telephone" name="telephone" [disabled]="!isEditing">
                  </div>
                </div>
              </div>
              <div class="row mb-4">
                <div class="col-12">
                  <label class="form-label">Rôle</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-briefcase"></i></span>
                    <input type="text" class="form-control" [value]="getRoleName()" disabled>
                  </div>
                </div>
              </div>
              <div class="d-flex gap-2">
                <button *ngIf="!isEditing" type="button" class="btn btn-primary" (click)="enableEditing()">
                  <i class="fas fa-edit me-2"></i>Modifier
                </button>
                <button *ngIf="isEditing" type="button" class="btn btn-success" (click)="updateProfile()" [disabled]="infoForm.invalid">
                  <i class="fas fa-save me-2"></i>Enregistrer
                </button>
                <button *ngIf="isEditing" type="button" class="btn btn-secondary" (click)="cancelEditing()">
                  <i class="fas fa-times me-2"></i>Annuler
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Changement de mot de passe -->
        <div class="password-card mt-4">
          <div class="card-header-custom">
            <h5 class="mb-0"><i class="fas fa-lock me-2"></i>Modifier le mot de passe</h5>
          </div>
          <div class="card-body p-4">
            <form #passwordForm="ngForm" (ngSubmit)="changePassword()">
              <div class="mb-3">
                <label class="form-label">Mot de passe actuel</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-key"></i></span>
                  <input type="password" class="form-control" [(ngModel)]="currentPassword" name="currentPassword" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Nouveau mot de passe</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-lock"></i></span>
                  <input type="password" class="form-control" [(ngModel)]="newPassword" name="newPassword" required minlength="6">
                </div>
                <small class="text-muted">Minimum 6 caractères</small>
              </div>
              <div class="mb-3">
                <label class="form-label">Confirmer le mot de passe</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                  <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" required>
                </div>
                <div *ngIf="newPassword !== confirmPassword && confirmPassword" class="text-danger small mt-1">
                  Les mots de passe ne correspondent pas
                </div>
              </div>
              <button type="submit" class="btn btn-warning" [disabled]="passwordForm.invalid || newPassword !== confirmPassword">
                <i class="fas fa-sync-alt me-2"></i>Changer le mot de passe
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
