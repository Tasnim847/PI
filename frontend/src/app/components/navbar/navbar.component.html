<!-- Navbar existante - ajouter *ngIf="isVisible" en haut -->
<nav *ngIf="isVisible" class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand p-0" routerLink="/">
      <img
        src="assets/images/logo.png"
        alt="SurFinity"
        width="120"
        height="40"
        class="d-inline-block align-middle"
        style="object-fit: contain;"
      >
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <!-- Home - visible pour tous -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/public/home" routerLinkActive="active">Home</a>
        </li>

        <!-- Credit - visible pour CLIENT et AGENT_FINANCE seulement -->
        <li class="nav-item" *ngIf="isCreditVisible()">
          <a class="nav-link" routerLink="/public/credit" routerLinkActive="active">Credit</a>
        </li>

        <!-- Insurance - visible pour CLIENT et AGENT_ASSURANCE seulement -->
        <li class="nav-item" *ngIf="isInsuranceVisible()">
          <a class="nav-link" routerLink="/public/insurance" routerLinkActive="active">Insurance</a>
        </li>

        <!-- Account - visible pour CLIENT et AGENT_ASSURANCE seulement -->
        <li class="nav-item" *ngIf="isAccountVisible()">
          <a class="nav-link" routerLink="/public/account" routerLinkActive="active">Account</a>
        </li>

        <!-- Complaint - visible pour CLIENT et AGENT_FINANCE seulement -->
        <li class="nav-item" *ngIf="isComplaintVisible()">
          <a class="nav-link" routerLink="/public/complaint" routerLinkActive="active">Complaint</a>
        </li>

        <!-- News - visible pour CLIENT et AGENT_ASSURANCE seulement -->
        <li class="nav-item" *ngIf="isNewsVisible()">
          <a class="nav-link" routerLink="/public/news" routerLinkActive="active">News</a>
        </li>

        <!-- Products - visible pour CLIENT et AGENT_ASSURANCE seulement -->
        <li class="nav-item" *ngIf="isProductsVisible()">
          <a class="nav-link" routerLink="/public/products" routerLinkActive="active">Products</a>
        </li>

        <!-- Claims - visible pour CLIENT et AGENT_ASSURANCE seulement -->
        <li class="nav-item" *ngIf="isClaimsVisible()">
          <a class="nav-link" 
            [routerLink]="getClaimsLink()" 
            routerLinkActive="active">
            Claims
          </a>
        </li>

        <!-- Compensation - visible pour CLIENT et AGENT_ASSURANCE seulement -->
        <li class="nav-item" *ngIf="isCompensationVisible()">
          <a class="nav-link" routerLink="/public/compensations" routerLinkActive="active">Compensation</a>
        </li>
      </ul>
      <div class="d-flex align-items-center">
        <div class="dropdown">
          <!-- Seulement l'avatar en petit cercle, pas de texte -->
          <button class="btn-avatar" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <div class="profile-avatar">
              <img
                *ngIf="profilePhoto"
                [src]="profilePhoto"
                alt="Photo de profil"
                class="profile-avatar-img"
                (error)="profilePhoto = ''"
              />
              <i *ngIf="!profilePhoto" class="fas fa-user-circle"></i>
            </div>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li class="dropdown-header">
              <strong>{{ firstName }} {{ lastName }}</strong>
              <br>
              <small class="text-muted">{{ userEmail }}</small>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" routerLink="/public/profile" routerLinkActive="active"><i class="fas fa-user me-2"></i>My Profile</a></li>
            <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i>Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" (click)="logout($event)" style="cursor: pointer;"><i class="fas fa-sign-out-alt me-2"></i>	Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>
