<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Risk Assessment</title>
</head>
<body>
<h1>Contract Evaluation: <span th:text="${evaluationData.contractReference}"></span></h1>
<p>Client: <span th:text="${evaluationData.clientName}"></span></p>
<p>Agent: <span th:text="${evaluationData.agentName}"></span></p>
<p>Date: <span th:text="${#dates.format(evaluationData.evaluationDate,'dd/MM/yyyy')}"></span></p>

<h2>Overall Score</h2>
<p>Score: <span th:text="${evaluationData.globalRiskScore}"></span></p>
<p>Risk Level: <span th:text="${evaluationData.globalRiskLevel}"></span></p>
<p>Risk Class: <span th:text="${evaluationData.globalRiskClass}"></span></p>
<p>Recommendation: <span th:text="${evaluationData.recommendation}"></span></p>
<p th:if="${evaluationData.autoReject}">Contract automatically rejected</p>

<h2>Details by Category</h2>
<div th:if="${evaluationData.categories != null}">
    <ul>
        <li th:each="entry : ${evaluationData.categories}">
            <strong th:text="${entry.value.categoryName}"></strong> :
            Risk Level: <span th:text="${entry.value.riskLevel}"></span>,
            Score: <span th:text="${entry.value.score}"></span>,
            Weight: <span th:text="${entry.value.weight}"></span>
            <p th:text="${entry.value.description}"></p>
            <ul>
                <li th:each="detail : ${entry.value.details}" th:text="${detail}"></li>
            </ul>
        </li>
    </ul>
</div>

<h2>Risk Factors</h2>
<div th:if="${evaluationData.riskFactors != null}">
    <ul>
        <li th:each="factor : ${evaluationData.riskFactors}">
            <strong th:text="${factor.factor}"></strong> :
            Impact: <span th:text="${factor.impact}"></span>,
            Points: <span th:text="${factor.points}"></span>
            <p th:text="${factor.description}"></p>
        </li>
    </ul>
</div>

<h2>Positive Points</h2>
<ul th:if="${evaluationData.positivePoints != null}">
    <li th:each="point : ${evaluationData.positivePoints}" th:text="${point}"></li>
</ul>

<h2>Recommended Actions</h2>
<ul th:if="${evaluationData.recommendedActions != null}">
    <li th:each="action : ${evaluationData.recommendedActions}" th:text="${action}"></li>
</ul>

<h2>Detailed Report</h2>
<p th:text="${evaluationData.detailedReport}"></p>
</body>
</html>
